  vibration: ^2.0.1
  open_file: ^3.5.10
  uuid: ^4.3.3
  flutter_image_compress: ^2.3.0
  app_links: ^7.0.0
  firebase_dynamic_links: ^6.1.10

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/logo/logo.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - assets/logo/
    - assets/templates/
    - assets/firebase_service_account.json
